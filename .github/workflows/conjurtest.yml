name: Conjur-Authn-JWT
on: 
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: 'write'
      contents: 'read'
    steps:
      - name: Testing before main script
        run: |
          JWT_TOKEN=$(curl -H "Authorization:bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r .value )
          echo "JWT token in base64 encode:"
          echo $JWT_TOKEN | base64
      - name: Fetching secrets from conjur
        uses: cyberark/conjur-action@v2.1.1
        with:
          url: https://india.secretsmgr.cyberark.cloud/api
          account: conjur
          authn_id: GithubAct
          secrets: data/vault/gitlab/gituser1-gitlabsafe/address|TEST_USER
      - name: Checking the result
        shell: pwsh
        env:
          # Use GitHub Secrets for sensitive data
          CLIENT_ID: "api-venu@india"
          CLIENT_SECRET: "Cyberark1"
          TENANT_URL: "https://abg4316.id.cyberark.cloud"
        run: |
          $Body = @{
            grant_type    = "client_credentials"
            client_id     = $env:CLIENT_ID
            client_secret = $env:CLIENT_SECRET
          }
          
          $Params = @{
            Method      = "Post"
            Uri         = "$($env:TENANT_URL)/OAuth2/token/test"
            ContentType = "application/x-www-form-urlencoded"
            Body        = $Body
          }

          try {
              $Response = Invoke-RestMethod @Params
              $AccessToken = $Response.access_token
              
              if ($AccessToken) {
                  Write-Host "Successfully retrieved Access Token."
                  # Note: Printing tokens to logs is risky. GitHub will mask it if 
                  # the value matches a secret, but be careful!
                  Write-Host "Token: $AccessToken"
              } else {
                  Write-Error "Token not found in response."
              }
          } catch {
              Write-Error "API Call failed: $_"
              exit 1
          }
